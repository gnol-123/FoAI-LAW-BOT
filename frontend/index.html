<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoRAai — Legal Research AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%234f46e5'/><text x='18' y='82' font-size='78' font-family='system-ui,sans-serif' font-weight='800' fill='white'>L</text></svg>">

  <!-- Apply dark class before render to prevent flash -->
  <script>
    if (localStorage.getItem("theme") === "dark" ||
        (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: "class" }</script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"
          integrity="sha256-Pn59f+s+XVjLbIBPaKtcJMx+XrYnD9bly7kSRzkhfQw="
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"
          integrity="sha256-ieH6dkfLSVNw06mXrOQ4f10V2fTFrxI1LFPapACVYoc="
          crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased bg-slate-950 dark:bg-slate-950">

  <!-- ── Login ─────────────────────────────────────────────────────────── -->
  <div id="login-view"
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 p-4">
    <div class="w-full max-w-sm">

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-900/40">
          <span class="text-2xl font-extrabold text-white select-none tracking-tighter">L</span>
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight">LoRAai</h1>
        <p class="text-slate-400 text-sm mt-1">Legal Research AI</p>
      </div>

      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-6 space-y-4">

        <!-- Sign in / Create account tabs -->
        <div class="flex bg-slate-100 dark:bg-slate-700 rounded-xl p-1 gap-1">
          <button id="tab-signin"
            class="flex-1 py-1.5 text-sm font-medium rounded-lg transition bg-white dark:bg-slate-600 text-slate-900 dark:text-white shadow-sm">
            Sign in
          </button>
          <button id="tab-register"
            class="flex-1 py-1.5 text-sm font-medium rounded-lg transition text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200">
            Create account
          </button>
        </div>

        <!-- Email / password form -->
        <form id="auth-form" class="space-y-3">
          <input type="email" id="auth-email" placeholder="Email address"
            autocomplete="email" required
            class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 bg-white dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
          <input type="password" id="auth-password" placeholder="Password"
            autocomplete="current-password" required
            class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 bg-white dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
          <input type="password" id="auth-confirm" placeholder="Confirm password"
            autocomplete="new-password" style="display:none"
            class="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 bg-white dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
          <button type="submit" id="auth-submit"
            class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium py-3 rounded-xl transition text-sm shadow-sm">
            Sign in
          </button>
          <p id="auth-error" class="text-red-500 text-xs text-center min-h-[1rem]"></p>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3">
          <hr class="flex-1 border-slate-200 dark:border-slate-600">
          <span class="text-xs text-slate-400 dark:text-slate-500">or</span>
          <hr class="flex-1 border-slate-200 dark:border-slate-600">
        </div>

        <!-- Google sign-in -->
        <button id="google-btn"
          class="w-full flex items-center justify-center gap-2.5 border border-slate-200 dark:border-slate-600 rounded-xl py-2.5 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 active:bg-slate-100 dark:active:bg-slate-600 transition">
          <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

      </div>
    </div>
  </div>

  <!-- ── Email verification pending ──────────────────────────────────── -->
  <div id="verify-view" style="display:none"
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 p-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-900/40 text-2xl">
          ✉️
        </div>
        <h2 class="text-2xl font-bold text-white mb-2">Check your email</h2>
        <p class="text-slate-400 text-sm">
          We sent a verification link to<br>
          <span id="verify-email" class="text-indigo-400 font-medium"></span>
        </p>
      </div>
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-6 space-y-3">
        <button id="verify-check-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium py-2.5 rounded-xl transition text-sm">
          I've verified my email
        </button>
        <button id="verify-resend-btn"
          class="w-full border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 font-medium py-2.5 rounded-xl transition text-sm">
          Resend verification email
        </button>
        <button id="verify-logout-btn"
          class="w-full text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-sm transition py-1">
          Use a different account
        </button>
        <p id="verify-msg" class="text-xs text-center text-slate-400 min-h-[1rem]"></p>
      </div>
    </div>
  </div>

  <!-- ── Chat ──────────────────────────────────────────────────────────── -->
  <div id="chat-view" style="display:none" class="flex h-screen">

    <!-- Sidebar -->
    <aside class="w-72 bg-slate-900 dark:bg-slate-950 flex flex-col flex-shrink-0 border-r border-slate-800 dark:border-slate-900">

      <div class="flex items-center justify-between px-4 py-4 border-b border-slate-800 dark:border-slate-900">
        <div class="flex items-center">
          <span class="text-white font-bold tracking-tight text-lg">LoRAai</span>
        </div>
        <button id="logout-btn"
          class="text-xs text-slate-400 hover:text-slate-200 border border-slate-700 hover:border-slate-500 rounded-lg px-3 py-1.5 transition">
          Logout
        </button>
      </div>

      <!-- Tabs -->
      <div class="flex px-3 pt-2 pb-0 gap-1">
        <button id="tab-chats"
          class="tab-btn flex-1 text-xs font-medium py-1.5 rounded-lg bg-slate-700 text-white transition">
          Chats
        </button>
        <button id="tab-docs"
          class="tab-btn flex-1 text-xs font-medium py-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition">
          Documents
        </button>
      </div>

      <!-- Chats panel -->
      <div id="panel-chats" class="flex flex-col flex-1 overflow-hidden">
        <div class="px-3 py-3">
          <button id="new-session-btn"
            class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 disabled:opacity-60 text-white text-sm font-medium py-2.5 rounded-xl transition shadow-sm">
            <span class="text-lg leading-none font-light">+</span>
            New Chat
          </button>
        </div>
        <div id="session-list" class="flex-1 overflow-y-auto px-2 pb-2 space-y-0.5"></div>
      </div>

      <!-- Documents panel -->
      <div id="panel-docs" style="display:none" class="flex flex-col flex-1 overflow-hidden">
        <div class="px-3 py-3">
          <label
            class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2.5 rounded-xl transition shadow-sm cursor-pointer">
            <span class="text-base leading-none">↑</span>
            Upload PDF
            <input id="doc-upload" type="file" accept=".pdf" class="hidden">
          </label>
          <div id="upload-status" class="hidden mt-2 text-xs text-slate-400 text-center"></div>
        </div>
        <div id="doc-list" class="flex-1 overflow-y-auto px-2 pb-2 space-y-1"></div>
      </div>

      <!-- Footer: token usage + user email + theme toggle -->
      <div class="px-4 py-3 border-t border-slate-800 dark:border-slate-900 space-y-2">
        <!-- Token bar -->
        <div id="token-bar-wrap" class="hidden">
          <div class="flex justify-between items-center mb-1">
            <span class="text-xs text-slate-500">Tokens</span>
            <span id="token-label" class="text-xs text-slate-500"></span>
          </div>
          <div class="h-1 w-full bg-slate-700 rounded-full overflow-hidden">
            <div id="token-bar" class="h-1 rounded-full transition-all duration-500 bg-indigo-500"></div>
          </div>
          <p id="token-reset" class="text-xs text-slate-600 mt-0.5 hidden"></p>
        </div>
        <div class="flex items-center gap-2">
          <p id="user-email" class="text-xs text-slate-500 truncate flex-1"></p>
          <button id="theme-toggle"
            class="flex-shrink-0 w-7 h-7 flex items-center justify-center text-slate-400 hover:text-slate-200 hover:bg-slate-700 rounded-lg transition text-sm"
            title="Toggle dark / light mode">
            🌙
          </button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col bg-white dark:bg-slate-900 overflow-hidden">

      <div id="messages" class="flex-1 overflow-y-auto flex flex-col">
        <div id="empty-state" class="flex flex-col items-center justify-center flex-1 text-center gap-2 py-20">
          <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-2 shadow-lg shadow-indigo-900/30">
            <span class="text-3xl font-extrabold text-white select-none tracking-tighter">L</span>
          </div>
          <h3 class="text-slate-700 dark:text-slate-200 font-semibold">Welcome to LoRAai</h3>
          <p class="text-slate-400 dark:text-slate-500 text-sm max-w-xs leading-relaxed">
            Your AI legal research assistant. Ask about statutes, case law, or legal principles.
          </p>
        </div>
      </div>

      <div class="px-6 py-4 border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900">
        <div class="flex items-end gap-3 max-w-4xl mx-auto">
          <textarea id="user-input" rows="1"
            placeholder="Ask a legal question… (Enter to send, Shift+Enter for new line)"
            class="flex-1 resize-none px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-700 focus:border-transparent transition max-h-32 leading-relaxed">
          </textarea>
          <button id="send-btn"
            class="flex-shrink-0 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium px-5 py-3 rounded-xl transition shadow-sm whitespace-nowrap">
            Send
          </button>
        </div>
      </div>

    </main>
  </div>

  <!-- Confirm modal -->
  <div id="confirm-backdrop"
    class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl p-6 w-80 max-w-[90vw] flex flex-col gap-4">
      <p id="confirm-message" class="text-slate-200 text-sm leading-relaxed"></p>
      <div class="flex gap-3 justify-end">
        <button id="confirm-cancel"
          class="px-4 py-2 text-sm text-slate-400 hover:text-slate-200 border border-slate-600 hover:border-slate-400 rounded-xl transition">
          Cancel
        </button>
        <button id="confirm-ok"
          class="px-4 py-2 text-sm font-medium bg-red-600 hover:bg-red-500 active:bg-red-700 text-white rounded-xl transition">
          Delete
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <!-- Firebase Storage SDK loaded via app.js import -->
</body>
</html>
