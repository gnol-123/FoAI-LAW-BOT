<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoRRAai — Legal Research AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='19' y='19' width='62' height='62' rx='15' fill='none' stroke='%2315181F' stroke-width='7'/><rect x='37' y='37' width='26' height='26' rx='3' fill='%23B79256' transform='rotate(45 50 50)'/></svg>">

  <script>
    /* Premium light is the default; dark is opt-in and remembered. */
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
    /* Apply saved text zoom before first paint to avoid a resize flash.
       The whole UI is rem/em-based, so scaling the root font-size zooms
       everything proportionally. Default 110% — slightly larger than the
       browser default for comfortable reading. */
    (function () {
      var z = parseInt(localStorage.getItem("appZoom"), 10);
      if (!z || z < 80 || z > 160) z = 110;
      document.documentElement.style.fontSize = (16 * z / 100) + "px";
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /* Brand theme: indigo → brass, slate → warm-ink, Plex / Newsreader type.
       Every runtime-applied class (chat.js) recolours automatically. */
    tailwind.config = {
      darkMode: "class",
      theme: { extend: {
        colors: {
          indigo: { 50:'#f6f0e6',100:'#ede1cc',200:'#e0cda8',300:'#d2b985',400:'#c5a569',500:'#b79256',600:'#8f7340',700:'#755e32',800:'#5c4a28',900:'#46391f' },
          slate:  { 50:'#f7f5f1',100:'#eeeae3',200:'#e2dcd2',300:'#cbc4b8',400:'#8c92a0',500:'#6e7480',600:'#4a4f5a',700:'#2b313b',800:'#1e232c',900:'#161a21',950:'#0e1116' },
        },
        fontFamily: {
          sans:  ['IBM Plex Sans','system-ui','sans-serif'],
          serif: ['Newsreader','Georgia','serif'],
          mono:  ['IBM Plex Mono','ui-monospace','monospace'],
        },
      } },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"
          integrity="sha256-Pn59f+s+XVjLbIBPaKtcJMx+XrYnD9bly7kSRzkhfQw="
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"
          integrity="sha256-ieH6dkfLSVNw06mXrOQ4f10V2fTFrxI1LFPapACVYoc="
          crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased bg-slate-50 dark:bg-slate-950 font-sans">

  <!-- Hidden until chat.js confirms the user is authenticated. -->
  <div id="chat-view" style="display:none" class="flex h-screen">

    <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
    <aside id="sidebar" class="bg-slate-900 dark:bg-slate-950 flex flex-col flex-shrink-0 border-r border-slate-800 dark:border-slate-900">

      <!-- Header -->
      <div id="sidebar-header" class="flex items-center justify-between px-4 py-4 border-b border-slate-800 dark:border-slate-900">

        <!-- Brand wordmark (hidden when collapsed) -->
        <div class="flex items-center gap-2.5 sidebar-label">
          <svg width="22" height="22" viewBox="0 0 100 100" class="flex-shrink-0"><rect x="19" y="19" width="62" height="62" rx="15" fill="none" stroke="#ECEAE4" stroke-width="7"/><rect x="37" y="37" width="26" height="26" rx="3" fill="#C9A86A" transform="rotate(45 50 50)"/></svg>
          <span class="text-white font-semibold tracking-tight text-base">LoRRA<span style="color:#C9A86A">ai</span></span>
        </div>

        <!-- Right actions -->
        <div class="flex items-center gap-1 flex-shrink-0">
          <button id="logout-btn"
            class="sidebar-label text-xs text-slate-400 hover:text-slate-200 border border-slate-700 hover:border-slate-500 rounded-lg px-3 py-1.5 transition">
            Logout
          </button>
          <!-- Sidebar toggle (always visible, Ctrl/Cmd+B) -->
          <button id="sidebar-toggle" title="Toggle sidebar"
            class="w-7 h-7 flex items-center justify-center text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg transition flex-shrink-0">
            <svg id="sidebar-chevron" class="w-4 h-4" style="transition:transform 0.25s ease" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div id="sidebar-tabs" class="flex px-3 pt-2 pb-0 gap-1 sidebar-label">
        <button id="tab-chats"
          class="tab-btn flex-1 text-xs font-medium py-1.5 rounded-lg bg-slate-700 text-white transition">
          Chats
        </button>
        <button id="tab-docs"
          class="tab-btn flex-1 text-xs font-medium py-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition">
          Documents
        </button>
      </div>

      <!-- Chats panel -->
      <div id="panel-chats" class="flex flex-col flex-1 overflow-hidden">
        <div class="px-3 py-3 sidebar-label">
          <button id="new-session-btn"
            class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 disabled:opacity-60 text-white text-sm font-medium py-2.5 rounded-xl transition shadow-sm">
            <span class="text-lg leading-none font-light">+</span>
            New Chat
          </button>
        </div>
        <div id="session-list" class="flex-1 overflow-y-auto px-2 pb-2 space-y-0.5 sidebar-label"></div>
      </div>

      <!-- Documents panel -->
      <div id="panel-docs" style="display:none" class="flex flex-col flex-1 overflow-hidden">
        <div class="px-3 py-3 sidebar-label">
          <label
            class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2.5 rounded-xl transition shadow-sm cursor-pointer">
            <span class="text-base leading-none">↑</span>
            Upload PDF
            <input id="doc-upload" type="file" accept=".pdf" class="hidden">
          </label>
          <div id="upload-status" class="hidden mt-2 text-xs text-slate-400 text-center"></div>
        </div>
        <div id="doc-list" class="flex-1 overflow-y-auto px-2 pb-2 space-y-1 sidebar-label"></div>
      </div>

      <!-- Footer -->
      <div id="sidebar-footer" class="px-4 py-3 border-t border-slate-800 dark:border-slate-900 space-y-2">
        <div id="token-bar-wrap" class="hidden sidebar-label">
          <div class="flex justify-between items-center mb-1">
            <span class="text-xs text-slate-500 font-mono uppercase tracking-wider" style="font-size:0.625rem">Credits</span>
            <span id="token-label" class="text-xs text-slate-500 font-mono"></span>
          </div>
          <div class="h-1 w-full bg-slate-700 rounded-full overflow-hidden">
            <div id="token-bar" class="h-1 rounded-full transition-all duration-500 bg-indigo-500"></div>
          </div>
          <p id="token-reset" class="text-xs text-slate-600 mt-0.5 hidden"></p>
        </div>
        <div id="sidebar-footer-row" class="flex items-center gap-2">
          <p id="user-email" class="sidebar-label text-xs text-slate-500 truncate flex-1 min-w-0"></p>

          <!-- Text zoom control (hidden when sidebar collapsed). Scales the root
               font-size, so the whole rem-based UI grows/shrinks together. -->
          <div id="zoom-control" class="sidebar-label flex items-center gap-0.5 flex-shrink-0">
            <button id="zoom-out" title="Smaller text"
              class="w-6 h-7 flex items-center justify-center text-slate-400 hover:text-slate-200 hover:bg-slate-700 rounded-md transition text-base leading-none disabled:opacity-30 disabled:hover:bg-transparent">−</button>
            <button id="zoom-reset" title="Reset text size"
              class="w-10 text-center text-[0.625rem] font-mono text-slate-500 hover:text-slate-300 tabular-nums transition">110%</button>
            <button id="zoom-in" title="Larger text"
              class="w-6 h-7 flex items-center justify-center text-slate-400 hover:text-slate-200 hover:bg-slate-700 rounded-md transition text-base leading-none disabled:opacity-30 disabled:hover:bg-transparent">+</button>
          </div>

          <button id="theme-toggle"
            class="flex-shrink-0 w-7 h-7 flex items-center justify-center text-slate-400 hover:text-slate-200 hover:bg-slate-700 rounded-lg transition text-sm"
            title="Toggle dark / light mode">
            🌙
          </button>
        </div>
      </div>
    </aside>

    <!-- ── Main ───────────────────────────────────────────────────────── -->
    <main id="chat-main" class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-900 overflow-hidden min-w-0 relative">

      <!-- Drag-and-drop overlay — appears when a file is dragged over the chat area -->
      <div id="drag-overlay"
        class="hidden absolute inset-0 z-20 flex items-center justify-center bg-slate-950/70 backdrop-blur-sm pointer-events-none">
        <div class="flex flex-col items-center gap-3 border-2 border-dashed border-indigo-400/50 rounded-2xl px-14 py-10">
          <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
          </svg>
          <p class="text-indigo-200 font-semibold text-sm">Drop file to attach</p>
          <p class="text-indigo-400/70 text-xs">PDF · image · Markdown · text</p>
        </div>
      </div>

      <div id="messages" class="flex-1 overflow-y-auto flex flex-col">
        <div id="empty-state" class="flex flex-col items-center justify-center flex-1 text-center gap-2 py-20 px-6">
          <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-black/20">
            <svg width="36" height="36" viewBox="0 0 100 100"><rect x="19" y="19" width="62" height="62" rx="15" fill="none" stroke="#ECEAE4" stroke-width="7"/><rect x="37" y="37" width="26" height="26" rx="3" fill="#C9A86A" transform="rotate(45 50 50)"/></svg>
          </div>
          <h3 class="font-serif text-slate-800 dark:text-slate-100 font-medium text-2xl tracking-tight">Welcome to LoRRA<span style="color:var(--brass)">ai</span></h3>
          <p class="text-slate-500 dark:text-slate-400 text-sm max-w-sm leading-relaxed">
            Your AI legal research assistant. Ask about statutes, case law, or legal principles — every answer arrives with its reasoning and exact citations.
          </p>
        </div>
      </div>

      <div class="px-6 py-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900">
        <div class="max-w-4xl mx-auto space-y-2">

          <!-- Attachment preview chip (hidden until a file is attached) -->
          <div id="attachment-preview" class="hidden items-center gap-2 px-1">
            <div class="flex items-center gap-2 bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-200 dark:border-indigo-500/25 rounded-xl px-3 py-2 text-xs max-w-sm">
              <span id="attachment-icon" class="flex-shrink-0 text-base">📄</span>
              <span id="attachment-filename" class="truncate text-indigo-700 dark:text-indigo-300 font-medium max-w-[200px]"></span>
              <span id="attachment-meta" class="text-indigo-400 dark:text-indigo-500 flex-shrink-0 font-mono"></span>
              <button id="attachment-remove"
                class="flex-shrink-0 ml-1 text-indigo-400 hover:text-red-500 dark:hover:text-red-400 transition"
                title="Remove attachment">✕</button>
            </div>
          </div>

          <!-- Input row -->
          <div class="flex items-end gap-2">
            <!-- Attach button -->
            <button id="attach-btn"
              title="Attach a file (PDF, image, Markdown, text)"
              class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-indigo-500 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
                  d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
              </svg>
            </button>
            <!-- Hidden file input — accepted types kept in sync with backend _ACCEPTED_EXTS -->
            <input id="file-input" type="file"
              accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,.md,.markdown,.txt"
              class="hidden">

            <!-- Extended Thinking toggle — sticky (stays lit until turned off).
                 Active styling is applied in chat.js (setExtendedMode). -->
            <button id="extended-btn" type="button" aria-pressed="false"
              title="Extended thinking — deeper reasoning &amp; more document searches (uses more tokens)"
              class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-indigo-500 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
                  d="M5 3v4M3 5h4M6.5 17v3m-1.5-1.5h3M13 4l2.286 6.857L21 13l-5.714 2.143L13 22l-2.286-6.857L5 13l5.714-2.143L13 4z"/>
              </svg>
            </button>

            <!-- No whitespace inside textarea — whitespace becomes initial content -->
            <textarea id="user-input" rows="1"
              placeholder="Ask a legal question… (Enter to send, Shift+Enter for new line)"
              class="flex-1 resize-none px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-700 focus:border-transparent transition max-h-32 leading-relaxed"></textarea>

            <button id="send-btn"
              class="flex-shrink-0 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-semibold px-5 py-3 rounded-xl transition shadow-sm whitespace-nowrap">
              Send
            </button>
          </div>

        </div>
      </div>

    </main>
  </div>

  <!-- Confirm modal -->
  <div id="confirm-backdrop"
    class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl p-6 w-80 max-w-[90vw] flex flex-col gap-4">
      <p id="confirm-message" class="text-slate-700 dark:text-slate-200 text-sm leading-relaxed"></p>
      <div class="flex gap-3 justify-end">
        <button id="confirm-cancel"
          class="px-4 py-2 text-sm text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 border border-slate-300 dark:border-slate-600 hover:border-slate-400 rounded-xl transition">
          Cancel
        </button>
        <button id="confirm-ok"
          class="px-4 py-2 text-sm font-medium bg-red-600 hover:bg-red-500 active:bg-red-700 text-white rounded-xl transition">
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Brand emoji: renders custom glyphs for :shortcodes: and standard emoji
       in assistant messages. Non-invasive, idempotent — no changes to chat.js. -->
  <script src="brand-emoji.js"></script>
  <script type="module" src="chat.js"></script>
</body>
</html>
